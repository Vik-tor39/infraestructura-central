# infraestructura/docker-compose.yml

services:

  # ─────────────────────────────────────────
  # OpenLDAP — Federación de usuarios
  # ─────────────────────────────────────────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "Plataforma Integrada"
      LDAP_DOMAIN: "plataforma.local"
      LDAP_ADMIN_PASSWORD: "admin_ldap"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    networks:
      - infra-net

  # ─────────────────────────────────────────
  # phpLDAPadmin — UI para gestionar OpenLDAP
  # ─────────────────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: "openldap"
    ports:
      - "8090:80"
    depends_on:
      - openldap
    networks:
      - infra-net

  # ─────────────────────────────────────────
  # PostgreSQL — Base de datos de Keycloak
  # ─────────────────────────────────────────
  keycloak_db:
    image: postgres:15
    container_name: keycloak_db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_pass
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - infra-net

  # ─────────────────────────────────────────
  # Keycloak — Identidad, SSO, 2FA, Roles
  # ─────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_pass
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_keycloak
    ports:
      - "8080:8080"
    depends_on:
      - keycloak_db
    networks:
      - infra-net

  # ─────────────────────────────────────────
  # Vault (KMS) — Gestión de llaves criptográficas
  # ─────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.16
    container_name: vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "vault_root_token"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    networks:
      - infra-net

# ─────────────────────────────────────────
# Volúmenes persistentes
# ─────────────────────────────────────────
volumes:
  ldap_data:
  ldap_config:
  keycloak_db_data:

# ─────────────────────────────────────────
# Red interna compartida
# ─────────────────────────────────────────
networks:
  infra-net:
    driver: bridge